<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperAssistant - AI论文陪读助手</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button id="sidebarToggle" class="sidebar-toggle" title="历史文档">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <label for="pdfUpload" class="header-upload-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                上传 PDF
            </label>
            <input type="file" id="pdfUpload" accept=".pdf" style="display:none;">
            <h1>PaperAssistant</h1>
            <span class="subtitle">AI 论文陪读助手</span>
            <span id="paperTitle" class="paper-title"></span>
            <div class="user-section">
                <span id="userDisplay" class="user-display">{{ user.username }}</span>
                <a href="/logout/" class="logout-link">退出</a>
            </div>
        </header>

        <div class="main-content">
            <div class="history-sidebar" id="historySidebar">
                <div class="history-header">
                    <span>历史文档</span>
                    <button id="historyCloseBtn" class="icon-btn" title="关闭">&times;</button>
                </div>
                <div id="historyList" class="history-list">
                    <div class="placeholder-text">暂无历史文档</div>
                </div>
            </div>

            <div class="left-panel" id="leftPanel">
                <object id="pdfObject" class="pdf-object" style="display:none;" type="application/pdf"></object>
                <div id="pdfWelcome" class="pdf-welcome">
                    <div class="welcome-icon">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                    </div>
                    <p>请上传一篇 PDF 论文开始阅读</p>
                </div>
                <div id="loadingOverlay" class="loading-overlay" style="display:none;">
                    <div class="spinner"></div>
                    <p id="loadingText">正在分析论文...</p>
                </div>
            </div>

            <div class="splitter" id="splitter"></div>

            <div class="right-panel" id="rightPanel">
                <div class="right-upper" id="rightUpper">
                    <div id="analysisSection" class="section analysis-section" style="display:none;">
                        <div class="section-header analysis-header" id="analysisHeader">
                            <span>AI 分析报告</span>
                            <button id="analysisToggle" class="collapse-btn">▼</button>
                        </div>
                        <div id="analysisContent" class="result-box analysis-content"></div>
                    </div>

                    <div class="section word-section">
                        <div class="section-header">单词查询</div>
                        <div class="word-input-row">
                            <input type="text" id="wordInput" placeholder="输入要查询的单词...">
                            <button id="wordSearchBtn" class="btn-primary">查询</button>
                        </div>
                        <div id="wordResult" class="result-box word-result">
                            <div class="placeholder-text">单词含义将显示在这里</div>
                        </div>
                    </div>

                    <div class="section qa-section">
                        <div class="section-header">AI 问答</div>
                        <textarea id="qaInput" rows="4" placeholder="向AI提问关于论文的问题...（Ctrl+Enter 发送）"></textarea>
                        <button id="qaBtn" class="btn-primary" style="width:100%; margin-top:6px;">提问</button>
                        <div id="qaResult" class="result-box qa-result">
                            <div class="placeholder-text">问答回复将显示在这里</div>
                        </div>
                    </div>
                </div>

                <div class="vsplitter" id="vsplitter"></div>

                <div class="right-lower" id="rightLower">
                    <div class="section wordbook-section">
                        <div class="section-header">
                            生词本
                            <span id="wordCount" class="badge">0</span>
                        </div>
                        <div id="wordbookList" class="wordbook-list">
                            <div class="placeholder-text">查询过的单词将自动添加到此处</div>
                        </div>
                        <div class="wordbook-actions">
                            <button id="exportBtn" class="btn-secondary">导出 CSV</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" style="display:none;"></div>
    <script src="{% static 'js/main.js' %}?v=3"></script>
</body>
</html>
